name: Deploy / Backend
on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"

permissions:
  contents: read
  packages: write

jobs:
  test:
    uses: ./.github/workflows/ci-tests.yml

  migrate:
    needs: test
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v6

      - name: Install Flyway
        uses: ./.github/actions/install-flyway

      - name: Run migrations
        env:
          FLYWAY_URL: ${{ secrets.FLYWAY_URL }}
          FLYWAY_USER: ${{ secrets.DATABASE_USER }}
          FLYWAY_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          FLYWAY_LOCATIONS: filesystem:db/migrations
        run: flyway migrate

  build:
    needs: migrate
    environment: prod
    env:
      GCP_PROJECT: ${{ vars.GCP_PROJECT }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Set up CA Certificate
        run: |
          printf "%s\n" "${{ secrets.DB_CA_CERT }}" > backend/ca.pem

      - name: Build Backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NODE_EXTRA_CA_CERTS: ca.pem
        working-directory: backend
        run: |
          npm ci
          ./build-for-prod.sh

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t ghcr.io/${{ github.repository }}:${{ github.sha }} ./backend

      - name: Push Docker image
        run: |
          docker push ghcr.io/${{ github.repository }}:${{ github.sha }}
          docker tag ghcr.io/${{ github.repository }}:${{ github.sha }} ghcr.io/${{ github.repository }}:latest
          docker push ghcr.io/${{ github.repository }}:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: prod
    env:
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      BACKEND_IP: ${{ vars.BACKEND_IP }}
      BACKEND_USER: deploy
    steps:
      - name: Deploy to VPS
        shell: bash
        run: |
          eval "$(ssh-agent -s)"
          echo "$SSH_PRIVATE_KEY" | ssh-add -
          ssh -o "StrictHostKeyChecking=no" $BACKEND_USER@$BACKEND_IP \
            "docker pull ghcr.io/${{ github.repository }}:latest && sudo systemctl restart bucket-bot"
