name: Deploy Backend
on:
  push:
    branches:
      - main
      - switch-to-terra

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    environment: prod
    env:
      GCP_PROJECT: ${{ vars.GCP_PROJECT }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set up CA Certificate
        run: |
          printf "%s\n" "${{ secrets.DB_CA_CERT }}" > backend/ca.pem

      - name: Build Backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NODE_EXTRA_CA_CERTS: ca.pem
        working-directory: backend
        run: |
          npm ci
          ./build-for-prod.sh

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build image
        run: |
          IMAGE=ghcr.io/${{ github.repository }}
          TAG=${{ github.sha }}
          cd backend
          docker build -t $IMAGE:$TAG .
          docker push $IMAGE:$TAG

      - name: Build Docker image for backend and push to Artifact Registry
        run: |
          GIT_SHA=$(git rev-parse --short HEAD)
          cd backend
          docker build -t europe-west2-docker.pkg.dev/${{ vars.GCP_PROJECT }}/docker/bucket-bot:$GIT_SHA .
          docker push europe-west2-docker.pkg.dev/${{ vars.GCP_PROJECT }}/docker/bucket-bot:$GIT_SHA
